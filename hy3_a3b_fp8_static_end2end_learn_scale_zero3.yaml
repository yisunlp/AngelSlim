global:
  save_path: ./output_hy3_a20b

model:
  name: HYV3MoE
  # Local directory or HuggingFace repo id containing the base HYV3 MoE
  # weights. Override on the command line with ``--model-path`` when
  # iterating.
  model_path: /apdcephfs_zwfy2/share_301053287/brunosu/HY3_Models/exp92_step60
  trust_remote_code: true
  torch_dtype: bfloat16
  # ZeRO-3 wants HF to NOT place the model via ``device_map``; the Engine
  # normalises the string "None"/"distributed" to Python ``None``.
  device_map: None
  low_cpu_mem_usage: true
  use_cache: false
  attn_implementation: flash_attention_2

compression:
  name: QAT
  quantization:
    name: fp8_static
    bits: 8
    quant_method:
      weight: per-tensor
      activation: per-tensor
    # Keep MoE router + embedding + lm_head in fp16/bf16. Use the fully
    # qualified ``router.gate`` to avoid accidentally matching the MLP's
    # ``gate_proj`` via substring.
    ignore_layers:
      - lm_head
      - embed_tokens
      - router.gate
  QAT:
    # Use the local TextDataset defined below instead of an HF dataset.
    hf_dataset: null
    # Point to any directory containing *.safetensors. When the
    # safetensors do not carry ``.weight_scale`` / ``.input_scale`` keys
    # the loader is a no-op and scales fall back to ``*_scale_init_value``
    # below (typical for a first-pass run without PTQ warm-start).
    from_ptq_ckpt: /apdcephfs_zwfy2/share_301053287/brunosu/HY3_Models/exp92_step60_quant
    training_mode: end2end
    dist_mode: hf
    save_format: real
    do_train: true
    loss_type: kl_top[_K]
    loss_topk: 1000
    kd_temperature: 1.0
    kd_alpha: 0.5
    lm_loss_weight: 0.0
    kd_loss_weight: 1.0
    plugin_config:
      enable_scale: true
      quant_config:
        use_weight_quant: true
        use_activation_quant: true
        use_qkv_quant: false
        weight_scale_init_value: 0.1
        activation_scale_init_value: 0.1
        learnable:
          act_scale: false
          weight_scale: true
          kv_scale: false
          norm: false
          lwc: false
    hf_args:
      bf16: true
      logging_steps: 1
      logging_first_step: true
      per_device_train_batch_size: 1
      gradient_accumulation_steps: 1
      learning_rate: 3.0e-5
      lr_scheduler_type: constant
      num_train_epochs: 1
      #max_steps: 10
      save_strategy: "no"
      warmup_ratio: 0.0
      max_grad_norm: 5.0
      gradient_checkpointing: true
      gradient_checkpointing_kwargs:
        use_reentrant: true
      deepspeed: configs/hunyuan_v3/qat/fp8_static/learn_scale/ds_config_zero3.json

dataset:
  name: TextDataset
  data_path: /apdcephfs_zwfy2/share_301053287/brunosu/angelslim_fsdp/apply_message_train_for_quant.json
  max_seq_length: 4096
  num_samples: 2560
  batch_size: 1
