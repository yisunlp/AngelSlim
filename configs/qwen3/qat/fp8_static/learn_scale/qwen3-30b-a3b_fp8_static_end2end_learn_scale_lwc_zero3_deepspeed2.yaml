global:
  save_path: ./output

model:
  name: Qwen
  model_path: /path/to/Qwen3-30B-A3B
  trust_remote_code: true
  torch_dtype: auto
  device_map: None
  low_cpu_mem_usage: true
  use_cache: false

compression:
  name: QAT
  quantization:
    name: fp8_static
    bits: 8
    quant_method:
      weight: per-tensor
      activation: per-tensor
      group_size: -1
    ignore_layers: ["lm_head", "embed_tokens", "gate.weight"]
  QAT:
    from_ptq_ckpt: /path/to/external/scales_or_final_quant_checkpoint
    require_external_scales_for_zero3: true
    training_mode: end2end
    dist_mode: hf
    save_format: real
    do_train: true
    loss_type: origin
    loss_topk: null
    kd_temperature: 1.0
    kd_alpha: 0.5
    plugin_config:
      enable_scale: true
      quant_config:
        use_weight_quant: true
        use_activation_quant: true
        use_qkv_quant: false
        skip_lazy_init: true
        weight_scale_init_value: 1.0
        activation_scale_init_value: 1.0
        lazy_init_samples: 0
        learnable:
          act_scale: true
          weight_scale: true
          kv_scale: false
          norm: false
          lwc: true
        lwc:
          enable_lwc: true
          lwc_init_value: 4.0
          lwc_lr: 0.2
    hf_args:
      logging_steps: 1
      logging_first_step: true
      per_device_train_batch_size: 1
      gradient_accumulation_steps: 1
      learning_rate: 1.0e-4
      lr_scheduler_type: cosine
      num_train_epochs: 1
      save_strategy: "no"
      warmup_ratio: 0.0
      max_grad_norm: 1.0
      gradient_checkpointing: true
      gradient_checkpointing_kwargs:
        use_reentrant: true
      deepspeed: configs/qwen3/qat/fp8_static/learn_scale/ds_config_zero3.json

dataset:
  name: TextDataset
  data_path: ./dataset/sharegpt_gpt4_qwen/sharegpt_gpt4-qwen3_a22B_output.jsonl
  max_seq_length: 1024
  num_samples: 256
  batch_size: 1
