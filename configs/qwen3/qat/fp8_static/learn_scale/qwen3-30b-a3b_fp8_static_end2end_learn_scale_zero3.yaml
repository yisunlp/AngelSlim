global:
  save_path: ./output

model:
  name: Qwen
  model_path: /apdcephfs_zwfy2/share_301053287/brunosu/all_models/Qwen3-30B-A3B
  trust_remote_code: true
  torch_dtype: auto
  # ZeRO-3 wants HF to NOT place the model with device_map; we pass
  # ``None`` here and the Engine normalizes the string "None"/"distributed".
  device_map: None
  low_cpu_mem_usage: true
  use_cache: false

compression:
  name: QAT
  quantization:
    name: fp8_static
    bits: 8
    quant_method:
      weight: per-tensor
      activation: per-tensor
    ignore_layers: ["lm_head", "embed_tokens", "gate.weight"]
  QAT:
    # Leave ``hf_dataset`` unset → End2EndTrainer.prepare_dataset falls back
    # to the ``dataset:`` section below (local TextDataset).
    hf_dataset: null
    # REQUIRED under ZeRO-3: bootstrap scales from a previous PTQ "real"
    # checkpoint (same model_path works if it already carries scales; else
    # point to an AngelSlim PTQ output dir). For the plain base model we
    # just fall back to the init-value below, so this file MUST exist or
    # the directory must contain *.safetensors even if they only carry
    # base weights (scales will be initialised from weight_scale_init_value
    # and activation_scale_init_value).
    from_ptq_ckpt: /apdcephfs_zwfy2/share_301053287/brunosu/all_models/Qwen3-30B-A3B
    training_mode: end2end
    dist_mode: hf
    save_format: real
    do_train: true
    loss_type: origin
    loss_topk: null
    kd_temperature: 1.0
    kd_alpha: 0.5
    plugin_config:
      enable_scale: true
      quant_config:
        use_weight_quant: true
        use_activation_quant: true
        use_qkv_quant: false
        # Init values used under ZeRO-3 when weight data is not accessible
        # (and as fallback whenever the from_ptq_ckpt does not carry scale
        # tensors).
        weight_scale_init_value: 0.1
        activation_scale_init_value: 0.1
        learnable:
          act_scale: false
          weight_scale: true
          kv_scale: false
          norm: false
          lwc: false
    hf_args:
      logging_steps: 1
      logging_first_step: true
      per_device_train_batch_size: 1
      gradient_accumulation_steps: 1
      learning_rate: 1.0e-4
      lr_scheduler_type: cosine
      num_train_epochs: 1
      max_steps: 3
      save_strategy: "no"
      warmup_ratio: 0.0
      max_grad_norm: 1.0
      gradient_checkpointing: true
      gradient_checkpointing_kwargs:
        use_reentrant: true
      deepspeed: configs/qwen3/qat/fp8_static/learn_scale/ds_config_zero3.json

dataset:
  name: TextDataset
  data_path: ./dataset/sharegpt_gpt4_qwen/sharegpt_gpt4-qwen3_a22B_output.jsonl
  max_seq_length: 4096
  num_samples: 256
  batch_size: 1
